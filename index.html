<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – ADBU MentorConnect</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>
<body style="display:flex; flex-direction:column; min-height:100vh;">
  <div class="auth-bg-pattern"></div>

  <button class="theme-icon-btn" id="themeToggle" title="Toggle theme"
    style="position:fixed;top:1rem;right:1rem;z-index:10;width:2.5rem;height:2.5rem;
           border-radius:50%;background:var(--card);border:1px solid var(--border);
           color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;
           align-items:center;justify-content:center;box-shadow:var(--shadow-sm)">
    <i class="bi bi-moon-fill"></i>
  </button>

  <div class="auth-page" style="flex:1;">
    <div class="auth-card animate-in">

      <div class="auth-logo">
        <img src="assets/logo.png" alt="ADBU" class="auth-logo-img">
        <div class="auth-logo-text">ADBU <span>MentorConnect</span></div>
      </div>

      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <div id="loginAlert" style="display:none;margin-bottom:1rem"></div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-group-custom">
          <i class="bi bi-envelope input-icon"></i>
          <input type="email" id="loginEmail" class="form-control-custom"
                 placeholder="you@example.com" autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between;align-items:center">
          Password
          <a href="pages/forgot-password.html" style="font-weight:500;font-size:0.8125rem">Forgot password?</a>
        </label>
        <div class="input-group-custom">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" id="loginPassword" class="form-control-custom"
                 placeholder="Your password" autocomplete="current-password">
          <i class="bi bi-eye input-icon-right" id="togglePassword" style="cursor:pointer"></i>
        </div>
      </div>

      <div class="form-group">
        <div class="h-captcha" data-sitekey="site_key_here"
             data-theme="light" id="hcaptchaWidget"></div>
        <div id="captchaError" style="display:none;color:var(--danger);font-size:0.8125rem;margin-top:0.25rem">
          <i class="bi bi-exclamation-circle me-1"></i>Please complete the CAPTCHA.
        </div>
      </div>

      <button class="btn-primary-custom w-100 justify-content-center" id="loginBtn"
              style="height:2.875rem;font-size:0.9375rem">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>

      <div class="divider-text" style="margin:1.5rem 0 1.25rem">or</div>

      <p style="text-align:center;font-size:0.875rem;color:var(--text-muted)">
        Don't have an account?
        <a href="pages/register.html" style="font-weight:600;margin-left:0.25rem">Create one</a>
      </p>
    </div>
  </div>

  <footer class="auth-footer">
    <img src="assets/logo.png" alt="Don Bosco University">
    <span>Copyright &copy; 2026 Don Bosco University, All Rights Reserved.</span>
    <a href="pages/about.php">About</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('togglePassword').addEventListener('click', function () {
      const input = document.getElementById('loginPassword');
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      this.className = isText ? 'bi bi-eye input-icon-right' : 'bi bi-eye-slash input-icon-right';
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const btn     = document.getElementById('loginBtn');
      const alertEl = document.getElementById('loginAlert');
      const email   = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const captcha  = hcaptcha.getResponse();

      alertEl.style.display = 'none';
      document.getElementById('captchaError').style.display = 'none';

      if (!email || !password) { showAlert(alertEl, 'Please fill in all fields.', 'error'); return; }
      if (!captcha)             { document.getElementById('captchaError').style.display = 'block'; return; }

      setButtonLoading(btn, true, 'Signing in...');
      const res = await API.post('php/login.php', { email, password, 'h-captcha-response': captcha });
      setButtonLoading(btn, false);

      if (res.success) {
        showAlert(alertEl, 'Login successful! Redirecting…', 'success');
        setTimeout(() => window.location.href = res.redirect, 700);
      } else {
        showAlert(alertEl, res.message || 'Login failed.', 'error');
        hcaptcha.reset();
      }
    });

    document.getElementById('loginPassword').addEventListener('keypress', e => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });

    function showAlert(el, msg, type) {
      el.style.display = 'flex';
      el.className = `alert-custom alert-${type}`;
      el.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>${msg}`;
    }
  </script>
</body>
</html>
